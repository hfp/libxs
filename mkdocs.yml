site_name: LIBXS
site_author: Hans Pabst
copyright: Copyright (c) Intel Corporation, LIBXS <a href="http://libxs.readthedocs.io/LICENSE/">Contributors</a>.
site_description: Library for extra small auxiliary functions and specialized operations.
repo_url: https://github.com/hfp/libxs/
edit_uri: edit/main/documentation
site_url: https://libxs.readthedocs.io/
docs_dir: documentation

markdown_extensions:
- toc:
    permalink: True
    toc_depth: 3
    title: None
extra_css:
- style.css

theme:
    name: readthedocs
    custom_dir: .theme

hooks:
- .theme/ford_hook.py

nav:
- Overview: index.md
- Scripts: libxs_scripts.md
- LIBXS Domains:
  - "GEMM: Matrix Multiplication": libxs_gemm.md
  - "MEM: Memory Operations": libxs_mem.md
  - "MHD: Meta Header Data": libxs_mhd.md
  - "MATH: Math Functions": libxs_math.md
  - "SYNC: Synchronization": libxs_sync.md
  - "TIMER: Timer Utilities": libxs_timer.md
  - "HIST: Histogram": libxs_hist.md
  - "RNG: Random Number Generator": libxs_rng.md
  - "REG: Registry": libxs_reg.md
  - "CPUID: CPU Identification": libxs_cpuid.md
  - "MALLOC: Memory Allocation": libxs_malloc.md
  - "UTILS: Utility Functions": libxs_utils.md
- Fortran: libxs_fortran.md
- About:
  - License: LICENSE.md
